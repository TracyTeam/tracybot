name: Build Check (OpenCode plugin)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'opencode-plugin/**'

jobs:
  build-oc:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opencode-plugin

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check Build
        run: bun run build
